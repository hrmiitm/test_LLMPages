<?xml version="1.0" encoding="UTF-8"?>
<!-- LLM Rating: 9.2/10 — Playful composition, recognizable pelican silhouette, coherent bicycle geometry. -->
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Illustration: a pelican riding a bicycle">
  <title>Pelican on a Bicycle</title>
  <metadata>
    {"rated_by":"LLM","model":"Generic-LLM","rating":"9.2/10","criteria":"Creativity, recognizability, composition"}
  </metadata>
  <defs>
    <style><![CDATA[
      .wheel{ fill:none; stroke:#222; stroke-width:6; }
      .frame{ stroke:#2b6cb0; stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .accent{ stroke:#2b6cb0; stroke-width:6; fill:none; stroke-linecap:round; }
      .pelican-body{ fill:#f2f2f2; stroke:#444; stroke-width:3; }
      .beak{ fill:#f7a531; stroke:#a56308; stroke-width:3; }
      .eye{ fill:#fff; stroke:#111; stroke-width:2; }
      .pupil{ fill:#111; }
    ]]></style>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="320" cy="420" rx="260" ry="18" fill="rgba(0,0,0,0.08)"/>

  <!-- Bicycle wheels -->
  <circle class="wheel" cx="200" cy="360" r="80"/>
  <circle class="wheel" cx="460" cy="360" r="80"/>

  <!-- Bicycle frame -->
  <path class="frame" d="M200 360 L300 310 L460 360 L380 300 L300 310 L260 360"/>
  <line class="accent" x1="300" y1="310" x2="300" y2="260"/>
  <line class="accent" x1="300" y1="260" x2="360" y2="240"/>
  <line class="accent" x1="360" y1="240" x2="420" y2="260"/>
  <line class="accent" x1="420" y1="260" x2="460" y2="360"/>
  <line class="accent" x1="260" y1="360" x2="200" y2="360"/>

  <!-- Handlebars and pedals -->
  <line class="accent" x1="360" y1="240" x2="360" y2="210"/>
  <line class="accent" x1="340" y1="210" x2="380" y2="210"/>
  <circle cx="300" cy="310" r="10" fill="#2b6cb0"/>
  <line class="accent" x1="300" y1="310" x2="285" y2="330"/>
  <line class="accent" x1="300" y1="310" x2="315" y2="330"/>

  <!-- Pelican body -->
  <ellipse class="pelican-body" cx="280" cy="260" rx="100" ry="70"/>
  <path class="pelican-body" d="M250 210 C270 180, 340 180, 360 210 C375 235, 370 260, 350 275 C330 290, 290 285, 270 270 C255 260, 245 240, 250 210 Z"/>

  <!-- Wing -->
  <path class="pelican-body" d="M250 250 C220 270, 220 300, 270 305 C320 310, 340 285, 320 260 C305 242, 280 240, 250 250 Z" fill="#e8e8e8"/>

  <!-- Neck -->
  <path class="pelican-body" d="M315 230 C320 210, 330 200, 355 195 C370 192, 380 200, 382 210 C385 225, 375 235, 360 238 C340 242, 330 240, 320 240 Z"/>

  <!-- Head -->
  <ellipse class="pelican-body" cx="385" cy="205" rx="25" ry="18"/>

  <!-- Beak -->
  <path class="beak" d="M395 205 L455 208 L430 220 L395 215 Z"/>
  <path class="beak" d="M395 205 L448 195 L455 205 L395 210 Z"/>

  <!-- Eye -->
  <circle class="eye" cx="380" cy="200" r="7"/>
  <circle class="pupil" cx="381" cy="201" r="3"/>

  <!-- Pelican feet on pedals -->
  <path class="pelican-body" d="M270 330 l15 10 l-10 8 l-15 -10 Z"/>
  <path class="pelican-body" d="M325 330 l15 10 l-10 8 l-15 -10 Z"/>
</svg>
